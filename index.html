  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; overflow-x: hidden; }
    body { font-family: 'Plus Jakarta Sans', sans-serif; background: #F5F5F0; overflow-x: hidden; }

    @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
    @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes scaleIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
    @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
    @keyframes bounce { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.2); } }
    @keyframes confetti { 0% { transform: translateY(0) rotate(0); opacity: 1; } 100% { transform: translateY(-100px) rotate(720deg); opacity: 0; } }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes gradientShift { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
    @keyframes pageIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes skeletonPulse { 0% { background-position: -1000px 0; } 100% { background-position: 1000px 0; } }

    .animate-float { animation: float 4s ease-in-out infinite; }
    .animate-fade-in-up { animation: fadeInUp 0.8s ease-out forwards; }
    .animate-scale-in { animation: scaleIn 0.6s ease-out forwards; }
    .animate-pulse { animation: pulse 2s ease-in-out infinite; }
    .animate-bounce { animation: bounce 0.3s ease-out; }
    .page-transition { animation: pageIn 0.3s ease-out; }
    .skeleton-loading { background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%); background-size: 1000px 100%; animation: skeletonPulse 2s infinite; }

    /* Accessibility: visible focus ring for keyboard navigation */
    *:focus-visible { outline: 3px solid #F2A900; outline-offset: 2px; border-radius: 4px; }
    button:focus:not(:focus-visible), a:focus:not(:focus-visible) { outline: none; }

    /* Skip to content link for screen readers / keyboard users */
    .skip-to-content { position: absolute; left: -9999px; top: 0; z-index: 10000; padding: 12px 24px; background: #2D7D46; color: #fff; font-weight: 700; font-size: 16px; text-decoration: none; border-radius: 0 0 8px 0; }
    .skip-to-content:focus { left: 0; }

    /* Product card image zoom on hover */
    .product-card-img { transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
    .product-card:hover .product-card-img { transform: scale(1.08); }

    ::-webkit-scrollbar { width: 10px; }
    ::-webkit-scrollbar-track { background: #1A2E1A; }
    ::-webkit-scrollbar-thumb { background: #2D7D46; border-radius: 5px; }
    ::-webkit-scrollbar-thumb:hover { background: #4CAF50; }

    @media (max-width: 768px) {
      .mobile-nav-items { display: none !important; opacity: 0; transform: translateY(-10px); transition: opacity 0.3s ease, transform 0.3s ease; }
      .mobile-nav-items.open { display: flex !important; opacity: 1; transform: translateY(0); flex-direction: column; position: fixed; top: 60px; left: 0; right: 0; bottom: 0; background: rgba(26,46,26,0.98); padding: 24px; gap: 8px !important; z-index: 999; align-items: stretch !important; justify-content: flex-start !important; overflow-y: auto; }
      .mobile-nav-items.open button { color: #fff !important; font-size: 18px !important; padding: 16px 24px !important; text-align: left !important; border-radius: 12px !important; transition: background 0.2s ease; }
      .mobile-nav-items.open button:hover { background: rgba(45,125,70,0.3) !important; }
      .hamburger-btn { display: flex !important; }
      .sell-link-desktop { display: none !important; }

      /* Mobile-specific touch targets: ensure min 44px height */
      button, input[type="button"], input[type="submit"] { min-height: 44px; }

      /* Text overflow handling for product names and descriptions */
      h3, h4, .product-title, .product-name { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

      /* Product grid responsive sizing */
      .product-grid { display: grid !important; grid-template-columns: repeat(auto-fill, minmax(155px, 1fr)) !important; gap: 12px !important; }

      /* Checkout form mobile padding */
      input[type="text"], input[type="tel"], input[type="email"], textarea, select {
        padding: 12px 14px !important;
        min-height: 44px !important;
        font-size: 16px !important;
      }

      /* Cart page mobile layout */
      .cart-item { flex-direction: column; align-items: flex-start; gap: 12px !important; }
      .cart-item-details { width: 100%; }
      .cart-item-controls { flex-wrap: wrap; width: 100%; }
    }
    @media (min-width: 769px) {
      .hamburger-btn { display: none !important; }
    }

    /* Extra small devices (320px-480px) */
    @media (max-width: 480px) {
      body { font-size: 14px; }
      h1 { font-size: 22px !important; }
      h2 { font-size: 20px !important; }
      h3 { font-size: 16px !important; }

      /* Padding adjustments for very small screens */
      [style*="padding"][style*="24px"] { padding: 16px !important; }
      [style*="padding"][style*="40px"] { padding: 20px !important; }
      [style*="gap"][style*="24"] { gap: 16px !important; }

      /* Filter bar stack vertically */
      .filter-bar { flex-direction: column; gap: 12px !important; }
      .filter-bar input, .filter-bar select { width: 100%; }

      /* Form fields full width */
      input[type="text"], input[type="tel"], input[type="email"], textarea, select {
        width: 100% !important;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation-duration: 0.01ms !important; animation-iteration-count: 1 !important; transition-duration: 0.01ms !important; }
    }
  </style>
</head>

  <script>
    // Register service worker for PWA with forced update
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js', { updateViaCache: 'none' })
          .then((reg) => {
            reg.update().catch(() => {});
            setInterval(() => reg.update().catch(() => {}), 5 * 60 * 1000);
            let refreshing = false;
            navigator.serviceWorker.addEventListener('controllerchange', () => {
              if (!refreshing) { refreshing = true; window.location.reload(); }
            });
          })
          .catch(() => {});
      });
    }
  </script>
  <script src="/chatbot.js" defer></script>
