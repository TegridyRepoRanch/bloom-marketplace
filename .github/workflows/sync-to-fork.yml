name: Sync to Fork
on:
  push:
    branches: [main]

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger fork sync
        run: |
          curl -s -X POST \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/HighestTegridyRepos/${{ github.event.repository.name }}/merge-upstream" \
            -d "{\"branch\":\"main\"}"
          echo "Fork synced"

