      const t = (key, vars) => {
        let str = translations[lang]?.[key] || translations.en[key] || key;
        if (vars) Object.keys(vars).forEach(k => { str = str.replace(`{${k}}`, vars[k]); });
        return str;

        const next = lang === 'en' ? 'th' : 'en';

    // Image Upload Component - uploads to Supabase Storage for CDN delivery
    const ImageUpload = ({ images, onImagesChange, maxImages = 5, sellerId }) => {
      const [uploading, setUploading] = useState(false);
      const [uploadError, setUploadError] = useState('');
      const [imgErrors, setImgErrors] = useState(new Set());

      const handleUpload = async (e) => {
        const files = Array.from(e.target.files);
        if (files.length === 0) return;

        setUploadError('');
        setUploading(true);
        const newImages = [...images];

        for (const file of files) {
          if (newImages.length >= maxImages) break;

          // Validate it's an image
          if (!file.type.startsWith('image/')) {
            setUploadError('Please select an image file.');
            setUploading(false);
            return;
          }

          // Validate file size
          if (file.size > 5 * 1024 * 1024) {
            setUploadError('File too large (max 5MB)');
            setUploading(false);
            return;
          }

          // Upload to Supabase Storage
          try {
            const fileExt = file.name.split('.').pop();
            const fileName = `${sellerId || 'unknown'}-${Date.now()}-${Math.random().toString(36).slice(2, 8)}.${fileExt}`;
            const filePath = `listings/${fileName}`;

            const { data, error: storageError } = await supabase.storage
              .from('images')
              .upload(filePath, file);

            if (storageError) {
              setUploadError(`Upload error: ${storageError.message}`);
              setUploading(false);
              return;
            }

            const { data: { publicUrl } } = supabase.storage
              .from('images')
              .getPublicUrl(filePath);

            // Add cache-busting param to ensure fresh image loads
            newImages.push(publicUrl + '?t=' + Date.now());
          } catch (err) {
            setUploadError(`Upload failed: ${err.message}`);
            setUploading(false);
            return;
          }
        }

        onImagesChange(newImages);
        setUploading(false);
      };

        onImagesChange(newImages);

        setImgErrors(newErrors);
      };

            marginBottom: 12,
            fontSize: 14,
            fontWeight: 600,
            color: colors.dark,

              padding: '12px 16px',
              background: colors.errorBg,

                  paddingBottom: '100%',

                  background: colors.blush,

                }}
              >
                {!imgErrors.has(index) ? (
                  <img
                    src={url}
                    alt={`Product ${index + 1}`}
                    loading="lazy"
                    style={{
                      position: 'absolute',
                      top: 0,
                      left: 0,
                      width: '100%',
                      height: '100%',
                      objectFit: 'cover',
                    }}
                    onError={() => handleImageError(index)}
                  />
                ) : (
                  <div style={{
                    position: 'absolute',
                    inset: 0,

                    alignItems: 'center',
                    justifyContent: 'center',

      const [password, setPassword] = useState('');
      const [confirmPassword, setConfirmPassword] = useState('');
      const [loading, setLoading] = useState(false);
      const [error, setError] = useState('');

      const handleSubmit = async (e) => {
        e.preventDefault();
        if (loading) return; // Prevent double submission
        setError('');
        setLoading(true);

        if (mode === 'signup' && password !== confirmPassword) {
          setError('Passwords do not match');
          setLoading(false);
          return;
        }

        if (password.length < 6) {
          setError('Password must be at least 6 characters');
          setLoading(false);
          return;
        }

        try {
          if (mode === 'signup') {
            const { data, error } = await supabase.auth.signUp({
              email,
              password,
            });
            if (error) throw error;
            if (data.user) {
              onAuthSuccess(data.user, true); // true = new user
            }
          } else {
            const { data, error } = await supabase.auth.signInWithPassword({
              email,
              password,
            });
            if (error) throw error;
            if (data.user) {
              onAuthSuccess(data.user, false); // false = existing user
            }
          }
        } catch (err) {
          if (err.message === 'Failed to fetch' || err.message.includes('NetworkError') || err.message.includes('fetch')) {
            setError('Unable to connect to the server. The database may be paused — please contact the site admin to restore it, or try again in a few minutes.');
          } else {
            setError(err.message);
          }
        }
        setLoading(false);
      };

      return (
        <div className="page-transition" style={{
          minHeight: '100vh',
          display: 'flex',
          flexDirection: 'column',
          alignItems: 'center',
          justifyContent: 'center',
          padding: 20,
          background: `linear-gradient(180deg, ${colors.cream} 0%, ${colors.peach} 100%)`,
        }}>
          <a
            href="/"
            style={{
              position: 'absolute',
              top: 20,
              left: 20,
              background: 'rgba(255,255,255,0.9)',
              border: 'none',
              padding: '8px 16px',
              borderRadius: 20,
              color: colors.primary,
              fontWeight: 600,
              cursor: 'pointer',
              fontSize: 14,
              textDecoration: 'none',
              transition: 'all 0.3s ease',
            }}
            onMouseOver={(e) => e.target.style.background = colors.white}
            onMouseOut={(e) => e.target.style.background = 'rgba(255,255,255,0.9)'}
          >
            ← Back to Shop
          </a>

    // =============================================
    // PROFILE SETUP SCREEN
    // =============================================

    const ProfileSetupScreen = ({ user, onComplete, existingProfile }) => {
      const { t } = useLanguage();
      const isMobile = useIsMobile();
      const [loading, setLoading] = useState(false);
      const [error, setError] = useState('');
      const [step, setStep] = useState(1);
      const totalSteps = 3;

      // Form state
      const [displayName, setDisplayName] = useState(existingProfile?.display_name || '');
      const [farmName, setFarmName] = useState(existingProfile?.farm_name || '');
      const [location, setLocation] = useState(existingProfile?.location || '');
      const [bio, setBio] = useState(existingProfile?.bio || '');
      const [phone, setPhone] = useState(existingProfile?.phone || '');
      const [farmSize, setFarmSize] = useState(existingProfile?.farm_size || '');
      const [yearsExperience, setYearsExperience] = useState(existingProfile?.years_experience || '');
      const [growingMethods, setGrowingMethods] = useState(existingProfile?.growing_methods || []);
      const [certifications, setCertifications] = useState(existingProfile?.certifications || []);
      const [websiteUrl, setWebsiteUrl] = useState(existingProfile?.website_url || '');
      const [instagramHandle, setInstagramHandle] = useState(existingProfile?.instagram_handle || '');
      const [profilePhotoUrl, setProfilePhotoUrl] = useState(existingProfile?.profile_photo_url || '');
      const [notificationEmail, setNotificationEmail] = useState(existingProfile?.notification_email || '');
      const [lineNotifyToken, setLineNotifyToken] = useState(existingProfile?.line_notify_token || '');
      const [promptpayId, setPromptpayId] = useState(existingProfile?.promptpay_id || '');
      const [uploadingPhoto, setUploadingPhoto] = useState(false);

      const handlePhotoUpload = async (e) => {
        const file = e.target.files[0];
        if (!file) return;

        // Validate it's an image
        if (!file.type.startsWith('image/')) {
          setError('Please select an image file.');
          return;
        }

        // Validate file size
        if (file.size > 5 * 1024 * 1024) {
          setError('File too large (max 5MB)');
          return;
        }

        setError('');
        setUploadingPhoto(true);
        const fileExt = file.name.split('.').pop();
        const fileName = `${user.id}-${Date.now()}.${fileExt}`;
        const filePath = `profiles/${fileName}`;

        const { data, uploadError } = await supabase.storage
          .from('images')
          .upload(filePath, file);

        if (uploadError) {
          setError(`Upload error: ${uploadError.message}`);
          setUploadingPhoto(false);
          return;
        }

        const { data: { publicUrl } } = supabase.storage
          .from('images')
          .getPublicUrl(filePath);

        setProfilePhotoUrl(publicUrl);
        setUploadingPhoto(false);
      };

      const handleSubmit = async () => {
        if (loading) return; // Prevent double submission
        setError('');

        // Validate display name length
        if (displayName.trim().length > 0 && displayName.trim().length < 2) {
          setError('Display name must be at least 2 characters long');
          return;
        }

        // Validate farm name length if provided
        if (farmName.trim().length > 0 && farmName.trim().length < 2) {
          setError('Farm/Business name must be at least 2 characters long');
          return;
        }

        // Validate bio max length
        if (bio.trim().length > 500) {
          setError('Bio must be 500 characters or less');
          return;
        }

        // Validate phone number if provided
        if (phone.trim()) {
          const phoneDigits = phone.replace(/\D/g, '');
          if (phoneDigits.length < 9) {
            setError('Phone number must be at least 9 digits');
            return;
          }
        }

        // Validate website URL if provided
        if (websiteUrl.trim()) {
          if (!websiteUrl.startsWith('http://') && !websiteUrl.startsWith('https://')) {
            setError('Website URL must start with http:// or https://');
            return;
          }
        }

        setLoading(true);

        // Use email username as fallback if no display name provided
        const finalDisplayName = displayName.trim() || user.email.split('@')[0];

        const profileData = {
          user_id: user.id,
          display_name: sanitize(finalDisplayName),
          email: user.email,
          phone: sanitize(phone) || null,
          location: sanitize(location) || null,
          bio: sanitize(bio) || null,
          profile_photo_url: profilePhotoUrl || null,
          farm_name: sanitize(farmName) || null,
          farm_size: farmSize || null,
          years_experience: yearsExperience ? parseInt(yearsExperience) : null,
          growing_methods: growingMethods.length > 0 ? growingMethods : null,
          certifications: certifications.length > 0 ? certifications : null,
          website_url: sanitize(websiteUrl) || null,
          instagram_handle: sanitize(instagramHandle) || null,
          notification_email: sanitize(notificationEmail) || null,
          line_notify_token: sanitize(lineNotifyToken) || null,
          promptpay_id: sanitize(promptpayId) || null,
        };

        try {
          if (existingProfile) {
            // Update existing profile
            const { error } = await supabase
              .from('profiles')
              .update(profileData)
              .eq('id', existingProfile.id);
            if (error) throw error;
          } else {
            // Insert new profile
            const { error } = await supabase
              .from('profiles')
              .insert([profileData]);
            if (error) throw error;
          }
          onComplete();
        } catch (err) {
          setError(err.message);
        }
        setLoading(false);
      };

      const renderStep1 = () => (
        <>
          <h2 style={{ fontSize: isMobile ? 18 : 24, fontWeight: 700, marginBottom: 8, color: colors.dark }}>
            {t('step_basics')}
          </h2>
          <p style={{ color: colors.gray, marginBottom: 28 }}>
            {t('step_basics_sub')}
          </p>

          {/* Profile Photo */}
          <div style={{ textAlign: 'center', marginBottom: 28 }}>
            <div style={{
              width: 120,
              height: 120,

    const CreateListingScreen = ({ profile, onBack, onSuccess, editingListing }) => {
      const { t } = useLanguage();
      const isMobile = useIsMobile();
      const [loading, setLoading] = useState(false);
      const [error, setError] = useState('');
      const [showSuccess, setShowSuccess] = useState(false);

      const [category, setCategory] = useState(editingListing?.category || '');
      const [title, setTitle] = useState(editingListing?.title || '');
      const [description, setDescription] = useState(editingListing?.description || '');
      const [price, setPrice] = useState(editingListing?.price?.toString() || '');
      const [priceUnit, setPriceUnit] = useState(editingListing?.price_unit || '');
      const [quantity, setQuantity] = useState(editingListing?.quantity?.toString() || '');
      const [images, setImages] = useState(editingListing?.images || []);
      const [growingMethod, setGrowingMethod] = useState(editingListing?.growing_method || '');

      const handleSubmit = async () => {
        setError('');

        if (!category.trim()) {
          setError('Please select a product category');
          return;
        }
        if (!title.trim()) {
          setError('Title is required');
          return;
        }
        if (title.trim().length < 3) {
          setError('Title must be at least 3 characters long');
          return;
        }
        if (title.trim().length > 200) {
          setError('Title must be 200 characters or less');
          return;
        }
        if (description.trim().length > 2000) {
          setError('Description must be 2000 characters or less');
          return;
        }
        if (!price || parseFloat(price) < 0.01) {
          setError('Please enter a valid price greater than 0');
          return;
        }
        if (!quantity || isNaN(parseInt(quantity)) || parseInt(quantity) <= 0) {
          setError('Please enter a valid quantity');
          return;
        }
        if (parseInt(quantity) > 10000) {
          setError('Quantity cannot exceed 10,000');
          return;
        }
        if (!priceUnit) {
          setError('Please select a price unit');
          return;
        }
        if (images.length === 0) {
          setError('Please add at least 1 product image');
          return;
        }

        if (loading) {
          return; // Prevent double submission
        }

        setLoading(true);

        try {
          const listingData = {
            title: sanitize(title),
            description: sanitize(description) || null,
            category: sanitize(category),
            price: parseFloat(price),
            price_unit: priceUnit,
            quantity_available: quantity ? parseInt(quantity) : null,
            images: images.length > 0 ? images : null,
            growing_method: growingMethod ? sanitize(growingMethod) : null,
          };

          let error;
          if (editingListing) {
            // Update existing listing
            const result = await supabase
              .from('listings')
              .update(listingData)
              .eq('id', editingListing.id);
            error = result.error;
          } else {
            // Create new listing
            const result = await supabase
              .from('listings')
              .insert([{
                ...listingData,
                seller_id: profile.id,
                is_available: true,
              }]);
            error = result.error;
          }

          if (error) throw error;
          setShowSuccess(true);
          setTimeout(() => {
            onSuccess();
          }, 1500);
        } catch (err) {
          setError(err.message);
        }
        setLoading(false);
      };

      return (
        <div className="page-transition" style={{
          minHeight: '100vh',
          padding: 20,
          background: colors.cream,
        }}>
          <div style={{ maxWidth: 600, margin: '0 auto' }}>

                  marginRight: 16,
                }}
              >←</button>
              <h1 style={{ fontSize: 24, fontWeight: 700, color: colors.dark }}>
                {editingListing ? t('edit_listing') : t('create_listing')}
              </h1>
            </div>

            <Card style={{ padding: 32 }} className="animate-slide-up">
              {error && (
                <div
                  className="animate-shake"
                  style={{
                    padding: '12px 16px',

                    borderRadius: 10,
                    color: colors.error,
                    fontSize: 14,
                    marginBottom: 20,
                  }}

                  {error}

              {showSuccess && (
                <div

                    borderRadius: 10,

                    fontSize: 14,
                    marginBottom: 20,
                    fontWeight: 600,
                    display: 'flex',

                    gap: 12,

                  <span style={{ fontSize: 18 }}>✓</span>
                  {t('listing_created')}
                </div>
              )}

              {/* Category Selector - First Field */}
              <div style={{ marginBottom: 28 }}>
                <label style={{
                  display: 'block',
                  marginBottom: 12,
                  fontSize: 14,
                  fontWeight: 600,
                  color: colors.dark,
                }}>
                  Product Category <span style={{ color: colors.primary }}>*</span>
                </label>
                <div style={{ display: 'grid', gridTemplateColumns: isMobile ? '1fr' : 'repeat(auto-fit, minmax(120px, 1fr))', gap: 12 }}>
                  {CATEGORIES.map((cat) => {
                    const isSelected = category === cat.value;
                    return (
                      <button
                        key={cat.value}
                        type="button"
                        onClick={() => {
                          setCategory(cat.value);
                          // Reset price unit if not valid for new category
                          const validUnits = getPriceUnitsForCategory(cat.value).map(u => u.value);
                          if (priceUnit && !validUnits.includes(priceUnit)) setPriceUnit('');
                        }}
                        style={{
                          padding: '16px 12px',
                          borderRadius: 12,
                          border: `2px solid ${isSelected ? colors.primary : colors.blush}`,
                          background: isSelected ? colors.gradient1 : colors.white,
                          color: isSelected ? colors.white : colors.dark,
                          fontSize: 16,

                          transition: 'all 0.3s ease',

                      </button>

                  })}
                </div>
              </div>

              <ImageUpload
                images={images}
                onImagesChange={setImages}
                maxImages={5}
                sellerId={profile?.user_id}
              />

              <Input
                label={t('listing_title')}
                value={title}
                onChange={setTitle}
                placeholder="Describe your product"
                required
              />

              <Input
                label={t('listing_price')}
                type="number"
                value={price}
                onChange={setPrice}
                placeholder="50"
                required
                icon="฿"
                min="0.01"
                step="0.01"

              <Select
                label={t('listing_price_unit')}
                value={priceUnit}
                onChange={setPriceUnit}
                options={getPriceUnitsForCategory(category)}
                placeholder="Select price unit"
                required
              />

              <Input
                label={t('listing_quantity')}
                type="number"
                value={quantity}
                onChange={setQuantity}
                placeholder="100"
              />

              <Select
                label={t('listing_strain')}

                onChange={setGrowingMethod}
                options={GROWING_METHODS}

              />

              <Input
                label={t('listing_desc')}
                multiline
                rows={4}
                value={description}
                onChange={setDescription}
                placeholder="Describe your product - specifications, features, quality standards, usage instructions..."

                loading={loading}
                fullWidth
                style={{ marginTop: 12 }}

              </Button>
            </Card>

        </div>
      );
    };

    const DashboardScreen = ({ user, profile, onLogout, onEditProfile, onCreateListing, onEditListing }) => {
      const { t } = useLanguage();
      const isMobile = useIsMobile();
      const [listings, setListings] = useState([]);
      const [orders, setOrders] = useState([]);
      const [loading, setLoading] = useState(true);
      const [showConfetti, setShowConfetti] = useState(false);
      const [alert, setAlert] = useState(null);
      const [activeTab, setActiveTab] = useState('listings'); // 'listings', 'orders', or 'analytics'
      const [showLogoutConfirm, setShowLogoutConfirm] = useState(false);
      const [deleteConfirm, setDeleteConfirm] = useState({ show: false, listing: null });
      const [cancelConfirm, setCancelConfirm] = useState({ show: false, orderId: null });
      const [statusFilter, setStatusFilter] = useState('all'); // for filtering orders by status
      const [orderSearch, setOrderSearch] = useState(''); // for searching orders by customer name, phone, or order ID

      const fetchListings = async () => {
        const { data, error } = await supabase
          .from('listings')
          .select('*')
          .eq('seller_id', profile.id)
          .order('created_at', { ascending: false })
          .limit(100);

        if (error) {
          setAlert({ type: 'error', message: `Failed to load listings: ${error.message}` });
          setListings([]);
        } else {
          setListings(data || []);
        }
        setLoading(false);
      };

      const fetchOrders = async () => {
        const { data, error } = await supabase
          .from('orders')
          .select('*')
          .eq('seller_id', profile.id)
          .order('created_at', { ascending: false })
          .limit(200);

        if (error) {
          setAlert({ type: 'error', message: `Failed to load orders: ${error.message}` });
          setOrders([]);
        } else {
          setOrders(data || []);
        }
      };

      const [updatingOrderId, setUpdatingOrderId] = useState(null);

      const updateOrderStatus = async (orderId, newStatus) => {
        if (updatingOrderId) return;
        setUpdatingOrderId(orderId);

        const { error } = await supabase
          .from('orders')
          .update({ status: newStatus })
          .eq('id', orderId);

        if (error) {
          setAlert({ type: 'error', message: `Failed to update order: ${error.message}` });
        } else {
          await fetchOrders();
          setAlert({ type: 'success', message: `Order marked as ${newStatus}` });
        }
        setUpdatingOrderId(null);
      };

      useEffect(() => {
        fetchListings();
        fetchOrders();
      }, [profile.id]);

      const handleToggleAvailability = async (listing) => {
        const { error } = await supabase
          .from('listings')
          .update({ is_available: !listing.is_available })
          .eq('id', listing.id);

        if (error) {
          setAlert({ type: 'error', message: `Failed to update listing: ${error.message}` });
        } else {
          fetchListings();
          setAlert({
            type: 'success',
            message: listing.is_available ? 'Listing hidden from buyers' : 'Listing is now visible!',
          });
        }
      };

      const handleDelete = (listing) => {
        setDeleteConfirm({ show: true, listing });
      };

      const confirmDelete = async () => {
        const listing = deleteConfirm.listing;
        setDeleteConfirm({ show: false, listing: null });

        // Delete images from storage first
        if (listing.images && Array.isArray(listing.images)) {
          const imagePaths = listing.images
            .map(url => {
              try {
                const urlObj = new URL(url);
                const match = urlObj.pathname.match(/\/object\/public\/images\/(.+)/);
                return match ? match[1] : null;
              } catch { return null; }
            })
            .filter(Boolean);
          if (imagePaths.length > 0) {
            await supabase.storage.from('images').remove(imagePaths);
          }
        }

        const { error } = await supabase
          .from('listings')
          .delete()
          .eq('id', listing.id);

        if (error) {
          setAlert({ type: 'error', message: `Failed to delete listing: ${error.message}` });
        } else {
          fetchListings();
          setAlert({ type: 'success', message: 'Listing deleted' });
        }
      };

      const activeListings = listings.filter(l => l.is_available).length;

      return (
        <div className="page-transition" style={{
          minHeight: '100vh',
          background: colors.cream,

                  <span style={{ fontSize: 20, fontWeight: 800, color: colors.white }}>SiamClones</span>
                </div>
                <div style={{ display: 'flex', gap: 12 }}>
                  <a
                    href="/"
                    style={{
                      background: 'rgba(255,255,255,0.15)',
                      border: '1px solid rgba(255,255,255,0.3)',
                      padding: '8px 16px',
                      borderRadius: 20,
                      color: colors.white,
                      fontWeight: 600,
                      cursor: 'pointer',
                      fontSize: 14,
                      textDecoration: 'none',
                      transition: 'all 0.3s ease',
                    }}
                    onMouseOver={(e) => e.target.style.background = 'rgba(255,255,255,0.25)'}
                    onMouseOut={(e) => e.target.style.background = 'rgba(255,255,255,0.15)'}
                  >
                    ← Back to Shop
                  </a>
                  <button
                    onClick={() => setShowLogoutConfirm(true)}
                    aria-label="Sign out of vendor portal"
                    style={{
                      background: 'rgba(255,255,255,0.2)',
                      border: 'none',
                      padding: '8px 16px',
                      borderRadius: 20,
                      color: colors.white,
                      fontWeight: 600,
                      cursor: 'pointer',
                      fontSize: 14,
                      transition: 'all 0.3s ease',
                    }}
                    onMouseOver={(e) => e.target.style.background = 'rgba(255,255,255,0.3)'}
                    onMouseOut={(e) => e.target.style.background = 'rgba(255,255,255,0.2)'}
                  >
                    {t('sign_out')}
                  </button>
                </div>
              </div>

              <div style={{ display: 'flex', alignItems: 'center', gap: 16 }}>
                <div style={{
                  width: 64,
                  height: 64,
                  borderRadius: '50%',
                  background: colors.white,
                  display: 'flex',
                  alignItems: 'center',
                  justifyContent: 'center',
                  overflow: 'hidden',
                }}>
                  {profile.profile_photo_url ? (
                    <img src={profile.profile_photo_url} alt="" loading="lazy" style={{ width: '100%', height: '100%', objectFit: 'cover' }} />
                  ) : (
                    <span style={{ fontSize: 28 }}>🌿</span>
                  )}
                </div>
                <div>
                  <h1 style={{ fontSize: 24, fontWeight: 700, color: colors.white, marginBottom: 4 }}>
                    {t('greeting', { name: profile.display_name })}
                  </h1>
                  <p style={{ color: 'rgba(255,255,255,0.8)', fontSize: 14 }}>
                    {profile.farm_name || profile.location || t('welcome_dashboard')}
                  </p>
                </div>
              </div>
            </div>
          </div>

          {/* Stats Cards */}
          <div style={{ maxWidth: 800, margin: '-48px auto 0', padding: '0 20px' }}>
            <div style={{ display: 'grid', gridTemplateColumns: isMobile ? '1fr' : 'repeat(auto-fit, minmax(150px, 1fr))', gap: 16, marginBottom: 24 }}>
              <Card style={{ textAlign: 'center', padding: 20 }}>
                <p style={{ fontSize: 32, fontWeight: 800, color: colors.primary, marginBottom: 4 }}>
                  {listings.length}
                </p>
                <p style={{ fontSize: 14, color: colors.gray }}>{t('stat_listings')}</p>
              </Card>
              <Card style={{ textAlign: 'center', padding: 20 }}>
                <p style={{ fontSize: 32, fontWeight: 800, color: colors.secondary, marginBottom: 4 }}>
                  {orders.filter(o => o.status === 'pending').length}
                </p>
                <p style={{ fontSize: 14, color: colors.gray }}>{t('stat_new_orders')}</p>
              </Card>
              <Card style={{ textAlign: 'center', padding: 20 }}>
                <p style={{ fontSize: 32, fontWeight: 800, color: colors.mint, marginBottom: 4 }}>
                  {orders.length}
                </p>
                <p style={{ fontSize: 14, color: colors.gray }}>{t('stat_total_orders')}</p>
              </Card>
            </div>

            {/* Quick Actions */}
            <div style={{ display: 'flex', gap: 12, marginBottom: 32 }}>
              <Button
                onClick={() => {
                  setShowConfetti(true);
                  setTimeout(() => setShowConfetti(false), 2000);
                  onCreateListing();
                }}
                style={{ flex: 1 }}
              >
                {t('new_listing')}
              </Button>
              <Button
                variant="secondary"
                onClick={onEditProfile}
                style={{ flex: 1 }}
              >
                {t('edit_profile')}
              </Button>

                      exportToCSV(listings, columns, `listings_${timestamp}.csv`);
                    }}
                    style={{ padding: '12px 20px', fontSize: 14 }}
                  >
                    {t('export_listings')}
                  </Button>
                </div>
              )}

              {loading ? (
                <Card style={{ textAlign: 'center', padding: 40 }}>
                  <Spinner size={32} />
                  <p style={{ color: colors.gray, marginTop: 12 }}>Loading listings...</p>
                </Card>
              ) : listings.length === 0 ? (
                <Card style={{ textAlign: 'center', padding: 48 }}>
                  <div className="animate-float" style={{ fontSize: 64, marginBottom: 16 }}>🌱</div>
                  <h3 style={{ fontSize: 20, fontWeight: 600, color: colors.dark, marginBottom: 8 }}>
                    {t('no_listings')}
                  </h3>
                  <p style={{ color: colors.gray, marginBottom: 24 }}>
                    {t('no_listings_sub')}
                  </p>
                  <Button onClick={onCreateListing}>
                    {t('create_first')}
                  </Button>
                </Card>
              ) : (
                listings.map(listing => (
                  <ListingCard
                    key={listing.id}
                    listing={listing}
                    onEdit={onEditListing}
                    onToggleAvailability={handleToggleAvailability}
                    onDelete={handleDelete}
                  />
                ))
              )}
            </div>
            )}
          </div>

          {/* Delete Listing Confirmation Modal */}
          <ConfirmModal
            show={deleteConfirm.show}
            title={t('confirm_delete')}
            message={`${t('confirm_delete')} "${deleteConfirm.listing?.title}"`}
            onConfirm={confirmDelete}
            onCancel={() => setDeleteConfirm({ show: false, listing: null })}
            confirmText={t('btn_confirm_yes')}
            cancelText={t('btn_cancel_modal')}
            isDangerous={true}
          />

          {/* Logout Confirmation Modal */}
          <ConfirmModal
            show={showLogoutConfirm}
            title={t('confirm_logout')}
            message={t('confirm_logout')}
            onConfirm={() => {
              setShowLogoutConfirm(false);
              onLogout();
            }}
            onCancel={() => setShowLogoutConfirm(false)}
            confirmText={t('btn_confirm_logout')}
            cancelText={t('btn_cancel_modal')}
          />

          {/* Order Cancellation Confirmation Modal */}
          <ConfirmModal
            show={cancelConfirm.show}
            title={t('confirm_cancel_order')}
            message={t('confirm_cancel_order')}
            onConfirm={() => {
              updateOrderStatus(cancelConfirm.orderId, 'cancelled');
              setCancelConfirm({ show: false, orderId: null });
            }}
            onCancel={() => setCancelConfirm({ show: false, orderId: null })}
            confirmText={t('btn_cancel_order')}
            cancelText={t('btn_cancel_modal')}
            isDangerous={true}
          />
        </div>
      );
    };

    // =============================================
    // ERROR BOUNDARY
    // =============================================

    class ErrorBoundary extends React.Component {
      constructor(props) {
        super(props);
        this.state = { hasError: false, error: null };
      }

      static getDerivedStateFromError(error) {
        return { hasError: true, error };
      }

      componentDidCatch(error, errorInfo) {
        // Error details intentionally not logged to prevent info leaks in production
      }

      render() {
        if (this.state.hasError) {
          return (
            <div style={{
              minHeight: '100vh',
              display: 'flex',
              alignItems: 'center',
              justifyContent: 'center',
              padding: 20,
              background: colors.cream,
            }}>
              <div style={{ maxWidth: 500, textAlign: 'center' }}>
                <div className="animate-float" style={{ fontSize: 64, marginBottom: 20 }}>⚠️</div>
                <h1 style={{ fontSize: 24, fontWeight: 700, color: colors.dark, marginBottom: 12 }}>
                  Something went wrong / เกิดข้อผิดพลาด
                </h1>
                <p style={{ color: colors.gray, marginBottom: 24, lineHeight: 1.6 }}>
                  An unexpected error occurred. Please try refreshing the page.<br/>เกิดข้อผิดพลาด กรุณาโหลดหน้าใหม่
                </p>
                <button
                  onClick={() => window.location.reload()}
                  style={{
                    padding: '12px 24px',
                    background: colors.primary,
                    color: colors.white,
                    border: 'none',
                    borderRadius: 12,
                    fontWeight: 600,
                    cursor: 'pointer',
                    fontSize: 14,
                  }}
                >
                  Refresh Page / โหลดใหม่
                </button>
              </div>
            </div>
          );
        }
        return this.props.children;
      }
    }

    // =============================================
    // MAIN APP
    // =============================================

    const App = () => {
      const [user, setUser] = useState(null);
      const [profile, setProfile] = useState(null);
      const [loading, setLoading] = useState(true);
      const [screen, setScreen] = useState('loading'); // loading, auth, setup, dashboard, create-listing
      const [isNewUser, setIsNewUser] = useState(false);
      const [editingListing, setEditingListing] = useState(null);

      // Check for existing session
      useEffect(() => {
        const checkSession = async () => {
          const { data: { session } } = await supabase.auth.getSession();
          if (session?.user) {
            setUser(session.user);
            await loadProfile(session.user.id);
          } else {
            setScreen('auth');
            window.history.replaceState({ screen: 'auth' }, '', '#auth');
          }
          setLoading(false);
        };
        checkSession();

        // Listen for auth changes
        const { data: { subscription } } = supabase.auth.onAuthStateChange(async (event, session) => {
          if (event === 'SIGNED_OUT') {
            setUser(null);
            setProfile(null);
            setScreen('auth');
            window.history.replaceState({ screen: 'auth' }, '', '#auth');
          }
        });

        return () => subscription.unsubscribe();
      }, []);

      useEffect(() => {
        window.scrollTo(0, 0);
      }, [screen]);

      // Navigation wrapper for History API support
      const navigateTo = (newScreen) => {
        setScreen(newScreen);
        window.history.pushState({ screen: newScreen }, '', `#${newScreen}`);
      };

      // Listen for browser back button
      useEffect(() => {
        const handlePopState = (event) => {
          if (event.state && event.state.screen) {
            setScreen(event.state.screen);
          } else {
            // If no state, go back to main site
            window.location.href = '/';
          }
        };
        window.addEventListener('popstate', handlePopState);
        return () => window.removeEventListener('popstate', handlePopState);
      }, []);

      const loadProfile = async (userId) => {
        const { data, error } = await supabase
          .from('profiles')
          .select('*')
          .eq('user_id', userId)
          .single();

        if (error && error.code !== 'PGRST116') {
          // Real database error (not just "no rows found")
          setAlert({ type: 'error', message: 'Failed to load profile. Please try again.' });
          setScreen('auth');
          window.history.replaceState({ screen: 'auth' }, '', '#auth');
          return;
        }

        if (data) {
          setProfile(data);
          setScreen('dashboard');
          window.history.replaceState({ screen: 'dashboard' }, '', '#dashboard');
        } else {
          // No profile exists, need to create one
          setScreen('setup');
          window.history.replaceState({ screen: 'setup' }, '', '#setup');
        }
      };

      const handleAuthSuccess = async (authenticatedUser, isNew) => {
        setUser(authenticatedUser);
        setIsNewUser(isNew);

        if (isNew) {
          navigateTo('setup');
        } else {
          await loadProfile(authenticatedUser.id);
        }
      };

      const handleProfileComplete = async () => {
        await loadProfile(user.id);
      };

      const handleLogout = async () => {
        await supabase.auth.signOut();
      };

      // Loading screen
      if (loading || screen === 'loading') {
        return (
          <div style={{
            minHeight: '100vh',
            display: 'flex',
            alignItems: 'center',
            justifyContent: 'center',
            background: colors.gradient1,
          }}>
            <div style={{ textAlign: 'center' }}>
              <div className="animate-float" style={{ fontSize: 64, marginBottom: 20 }}>🌿</div>
              <Spinner size={32} />
            </div>
          </div>
        );
      }

      // Auth screen
      if (screen === 'auth') {
        return <AuthScreen onAuthSuccess={handleAuthSuccess} />;
      }

      // Profile setup screen
      if (screen === 'setup') {
        return (
          <ProfileSetupScreen
            user={user}
            existingProfile={profile}
            onComplete={handleProfileComplete}
          />
        );
      }

      // Create listing screen
      if (screen === 'create-listing') {
        return (
          <CreateListingScreen
            profile={profile}
            onBack={() => {
              setEditingListing(null);
              navigateTo('dashboard');
            }}
            onSuccess={() => {
              setEditingListing(null);
              navigateTo('dashboard');
            }}
            editingListing={editingListing}
          />
        );
      }

      // Dashboard
      return (
        <DashboardScreen
          user={user}
          profile={profile}
          onLogout={handleLogout}
          onEditProfile={() => navigateTo('setup')}
          onCreateListing={() => {
            setEditingListing(null);
            navigateTo('create-listing');
          }}
          onEditListing={(listing) => {
            setEditingListing(listing);
            navigateTo('create-listing');
          }}
        />
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(
      <ErrorBoundary>
        <App />
      </ErrorBoundary>
    );
  </script>
  <script>
    // Register service worker for PWA with forced update
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js', { updateViaCache: 'none' })
          .then((reg) => {
            reg.update().catch(() => {});
            setInterval(() => reg.update().catch(() => {}), 5 * 60 * 1000);
            let refreshing = false;
            navigator.serviceWorker.addEventListener('controllerchange', () => {
              if (!refreshing) { refreshing = true; window.location.reload(); }
            });
          })
          .catch(() => {});
      });
    }
  </script>
  <script src="/chatbot.js" defer></script>
</body>
</html>
